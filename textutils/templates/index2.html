<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>TextUtils</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand fs-3">TextUtils</a>
        <form class="d-flex" role="search">
          <input
            class="form-control me-2"
            type="search"
            placeholder="Search"
            aria-label="Search"
          />
          <button class="btn btn-primary" type="submit">Search</button>
        </form>
      </div>
    </nav>

    <div
      class="alert alert-primary text-center alert-dismissible fade show"
      role="alert"
    >
      <strong class="fs-4">Hello</strong>
      <span class="fs-5"> Welcome to Text Analysis System</span>
      <button
        type="button"
        class="btn-close"
        data-bs-dismiss="alert"
        aria-label="Close"
      ></button>
    </div>

    <div class="container">
      <form action="/detailinfo/" method="post" >
        {% csrf_token %}
        <div class="mb-3 mt-2 fs-5">
          <label for="exampleFormControlTextarea1" class="form-label"
            >Enter Your Text Here</label
          >
          <textarea
            name="text"
            class="form-control"
            id="exampleFormControlTextarea1"
            rows="3"
          ></textarea>
        </div>

        <div class="form-check form-switch">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            name="uppercase"
            id="switchCheckDefault"
            style="transform: scale(1.3); border: 1.5px solid #404040"
          />
          <label class="form-check-label fs-4.5 ms-2" for="switchCheckDefault"
            >UpperCase</label
          >
        </div>

        <div class="form-check form-switch mt-2">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            name="lowercase"
            id="switchCheckDefault"
            style="transform: scale(1.3); border: 1.5px solid #404040"
          />
          <label class="form-check-label fs-4.5 ms-2" for="switchCheckDefault"
            >LowerCase</label
          >
        </div>

        <div class="form-check form-switch mt-2">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            name="swapcase"
            id="switchCheckDefault"
            style="transform: scale(1.3); border: 1.5px solid #404040"
          />
          <label class="form-check-label fs-4.5 ms-2" for="switchCheckDefault"
            >Swapcase</label
          >
        </div>

        <div class="form-check form-switch mt-2">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            name="title"
            id="switchCheckDefault"
            style="transform: scale(1.3); border: 1.5px solid #404040"
          />
          <label class="form-check-label fs-4.5 ms-2" for="switchCheckDefault"
            >Title</label
          >
        </div>

        <div class="form-check form-switch mt-2">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            name="len"
            id="switchCheckDefault"
            style="transform: scale(1.3); border: 1.5px solid #404040"
          />
          <label class="form-check-label fs-4.5 ms-2" for="switchCheckDefault"
            >Length</label
          >
        </div>

        <div class="text-center mt-3">
          <button class="btn btn-primary">Submit</button>
        </div>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
